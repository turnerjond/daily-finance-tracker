<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cash vs. Credit — Daily Ledger</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #11151a;
    color: #e8ebee;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    padding: 24px 16px 80px;
  }
  .mono { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }
  .wrap { max-width: 720px; margin: 0 auto; }
  .header-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 28px; }
  .eyebrow { font-size: 11px; color: #8b95a1; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 4px; }
  h1 { font-size: 26px; font-weight: 600; margin: 0; }
  .panel { background: #171c22; border: 1px solid #262d35; border-radius: 12px; padding: 20px; margin-bottom: 24px; }
  .panel-tight { padding: 18px; margin-bottom: 20px; }
  input[type=number]::-webkit-inner-spin-button { opacity: 0; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: #8b95a1; margin-bottom: 6px; }
  .field label .hint { color: #545d68; }
  .num-input {
    font-family: 'SFMono-Regular', Consolas, Menlo, monospace;
    background: #1d2329;
    border: 1px solid #262d35;
    color: #e8ebee;
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 15px;
    width: 100%;
  }
  .num-input:focus { outline: none; border-color: #5fd9a4; }
  .num-input::placeholder { color: #545d68; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  button:focus-visible, input:focus-visible { outline: 2px solid #5fd9a4; outline-offset: 2px; }
  .btn {
    font-family: 'SFMono-Regular', Consolas, Menlo, monospace;
    font-size: 13px;
    font-weight: 500;
    border-radius: 6px;
    padding: 10px 16px;
    cursor: pointer;
    border: 1px solid transparent;
    background: none;
  }
  .btn-primary { background: #5fd9a4; color: #0a1410; }
  .btn-primary:hover { opacity: 0.9; }
  .btn-ghost { background: transparent; border-color: #262d35; color: #8b95a1; }
  .btn-ghost:hover { color: #e8ebee; border-color: #8b95a1; }
  .date-input {
    font-family: 'SFMono-Regular', Consolas, Menlo, monospace;
    background: transparent;
    border: none;
    color: #e8ebee;
    font-size: 15px;
    font-weight: 500;
  }
  .row-between { display: flex; justify-content: space-between; align-items: center; }
  .live-box {
    background: #1d2329;
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .toast { font-size: 12px; color: #5fd9a4; }
  .labels-row { margin-top: 14px; padding-top: 14px; border-top: 1px solid #262d35; display: flex; gap: 10px; flex-wrap: wrap; }
  .summary-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 28px; }
  .summary-card { background: #171c22; border: 1px solid #262d35; border-radius: 10px; padding: 14px 16px; }
  .summary-label { font-size: 11px; color: #8b95a1; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
  .summary-value { font-family: 'SFMono-Regular', Consolas, Menlo, monospace; font-size: 19px; font-weight: 600; }
  .summary-delta { font-family: 'SFMono-Regular', Consolas, Menlo, monospace; font-size: 11px; margin-top: 3px; }
  .chart-block { background: #171c22; border: 1px solid #262d35; border-radius: 12px; padding: 16px 8px 12px 0; margin-bottom: 20px; }
  .chart-title { font-size: 12px; color: #8b95a1; margin-bottom: 4px; padding-left: 16px; font-family: 'SFMono-Regular', Consolas, Menlo, monospace; }
  .empty-state { text-align: center; padding: 40px 20px; color: #8b95a1; font-size: 13px; border: 1px dashed #262d35; border-radius: 12px; }
  .footer-note { margin-top: 28px; font-size: 12px; color: #8b95a1; text-align: center; }
  .sync-error { margin-top: 10px; font-size: 12px; color: #c47a7a; line-height: 1.5; }
  .recorded-dot { font-family: 'SFMono-Regular', Consolas, Menlo, monospace; font-size: 11px; color: #5fd9a4; }
  .tooltip-box {
    position: absolute;
    background: #1d2329;
    border: 1px solid #262d35;
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 12px;
    font-family: 'SFMono-Regular', Consolas, Menlo, monospace;
    pointer-events: none;
    display: none;
    white-space: nowrap;
  }
  @media (max-width: 560px) {
    .grid-2 { grid-template-columns: 1fr !important; }
  }
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
(function () {
  'use strict';

  const STORAGE_KEY = 'finance_tracker_entries';
  const CONFIG_KEY = 'finance_tracker_config';

  // ---------- state ----------
  let entries = {};
  let card1Label = 'Amazon Prime';
  let card2Label = 'Chase Freedom';
  let scriptUrl = '';
  let currentDate = todayStr();
  let showSettings = false;
  let editingLabels = false;
  let syncStatus = 'idle'; // idle | syncing | ok | error
  let syncError = '';
  let toastMsg = '';
  let toastTimer = null;

  // ---------- helpers ----------
  function todayStr() {
    const d = new Date();
    const tzOffset = d.getTimezoneOffset() * 60000;
    return new Date(d.getTime() - tzOffset).toISOString().slice(0, 10);
  }

  function fmtMoney(n) {
    if (n === null || n === undefined || isNaN(n)) return '—';
    const sign = n < 0 ? '-' : '';
    return sign + '$' + Math.abs(n).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function fmtMoneyShort(n) {
    if (n === null || n === undefined || isNaN(n)) return '—';
    const sign = n < 0 ? '-' : '';
    return sign + '$' + Math.abs(n).toLocaleString(undefined, { maximumFractionDigits: 0 });
  }

  function fmtDateLabel(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  }

  function esc(s) {
    const div = document.createElement('div');
    div.textContent = s == null ? '' : String(s);
    return div.innerHTML;
  }

  function loadLocal() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        entries = parsed.entries || {};
        if (parsed.card1Label) card1Label = parsed.card1Label;
        if (parsed.card2Label) card2Label = parsed.card2Label;
      }
    } catch (e) { /* ignore */ }
    try {
      const raw = localStorage.getItem(CONFIG_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        if (parsed.scriptUrl) scriptUrl = parsed.scriptUrl;
      }
    } catch (e) { /* ignore */ }
  }

  function persistLocal() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ entries, card1Label, card2Label }));
    } catch (e) { console.error('Storage error', e); }
  }

  function persistConfig() {
    try {
      localStorage.setItem(CONFIG_KEY, JSON.stringify({ scriptUrl }));
    } catch (e) { console.error('Storage error', e); }
  }

  function showToast(msg) {
    toastMsg = msg;
    render();
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { toastMsg = ''; render(); }, 2200);
  }

  // ---------- sheet sync ----------
  function pullFromSheet(urlOverride) {
    const url = urlOverride || scriptUrl;
    if (!url) return;
    syncStatus = 'syncing';
    syncError = '';
    render();
    fetch(url, { method: 'GET' })
      .then((res) => res.json())
      .then((data) => {
        if (data.ok) {
          entries = data.entries || {};
          if (data.card1Label) card1Label = data.card1Label;
          if (data.card2Label) card2Label = data.card2Label;
          persistLocal();
          syncStatus = 'ok';
          showToast('Synced from sheet');
        } else {
          syncStatus = 'error';
          syncError = data.error || 'Unknown error from script';
          render();
        }
      })
      .catch(() => {
        syncStatus = 'error';
        syncError = 'Could not reach Apps Script. Check the URL and that it is deployed with access "Anyone".';
        render();
      });
  }

  function pushToSheet(payload) {
    if (!scriptUrl) return;
    syncStatus = 'syncing';
    syncError = '';
    render();
    fetch(scriptUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload),
    })
      .then((res) => res.json())
      .then((data) => {
        syncStatus = data.ok ? 'ok' : 'error';
        if (!data.ok) syncError = data.error || 'Unknown error from script';
        render();
      })
      .catch(() => {
        syncStatus = 'error';
        syncError = 'Could not reach Apps Script. Check the URL and that it is deployed with access "Anyone".';
        render();
      });
  }

  // ---------- derived data ----------
  function getSortedDates() {
    return Object.keys(entries).sort();
  }

  function getTrailing14() {
    return getSortedDates().slice(-14).map((d) => {
      const e = entries[d];
      const totalCredit = e.totalCredit;
      const cash = e.cash;
      const cashMinusCredit = (cash ?? 0) - (totalCredit ?? 0);
      return {
        date: d,
        label: fmtDateLabel(d),
        totalCredit: totalCredit ?? null,
        cash: cash ?? null,
        cashMinusCredit,
        netWorth: e.netWorth ?? null,
      };
    });
  }

  // ---------- event handlers ----------
  function handleDateChange(value) {
    currentDate = value;
    render();
  }

  function handleSave() {
    const num = (v) => (v === '' || v === null || v === undefined) ? null : parseFloat(v);
    const get = (id) => document.getElementById(id).value;
    const entryData = {
      card1: num(get('field-card1')),
      card2: num(get('field-card2')),
      totalCredit: num(get('field-totalCredit')),
      cash: num(get('field-cash')),
      netWorth: num(get('field-netWorth')),
    };
    entries[currentDate] = entryData;
    persistLocal();
    showToast(scriptUrl ? 'Saved · syncing…' : 'Saved');
    if (scriptUrl) pushToSheet({ date: currentDate, ...entryData });
    render();
  }

  function handleSaveLabels() {
    card1Label = document.getElementById('label-card1').value || 'Card 1';
    card2Label = document.getElementById('label-card2').value || 'Card 2';
    persistLocal();
    editingLabels = false;
    if (scriptUrl) pushToSheet({ action: 'labels', card1Label, card2Label });
    render();
  }

  function handleSaveScriptUrl() {
    const trimmed = (document.getElementById('script-url-input').value || '').trim();
    scriptUrl = trimmed;
    persistConfig();
    showToast(trimmed ? 'Script URL saved' : 'Script URL cleared');
    if (trimmed) pullFromSheet(trimmed);
    render();
  }

  function liveCashMinusCredit() {
    const tc = parseFloat(document.getElementById('field-totalCredit') ? document.getElementById('field-totalCredit').value : '') || 0;
    const c = parseFloat(document.getElementById('field-cash') ? document.getElementById('field-cash').value : '') || 0;
    return c - tc;
  }

  // ---------- SVG line chart (no dependencies) ----------
  function buildChartSVG(data, key, color, zeroLine) {
    const w = 680, h = 130, padL = 50, padR = 16, padT = 12, padB = 22;
    const points = data.map((d) => ({ x: d.label, v: d[key] })).filter((p) => p.v !== null && p.v !== undefined);
    if (points.length === 0) {
      return `<div style="height:${h}px;display:flex;align-items:center;justify-content:center;color:#545d68;font-size:12px;">No data yet</div>`;
    }
    const values = points.map((p) => p.v);
    let min = Math.min(...values, zeroLine ? 0 : Infinity);
    let max = Math.max(...values, zeroLine ? 0 : -Infinity);
    if (min === max) { min -= 1; max += 1; }
    const pad = (max - min) * 0.1;
    min -= pad; max += pad;

    const innerW = w - padL - padR;
    const innerH = h - padT - padB;
    const n = data.length;
    const xFor = (i) => padL + (n === 1 ? innerW / 2 : (i / (n - 1)) * innerW);
    const yFor = (v) => padT + innerH - ((v - min) / (max - min)) * innerH;

    let pathD = '';
    let dots = '';
    data.forEach((d, i) => {
      const v = d[key];
      if (v === null || v === undefined) return;
      const x = xFor(i);
      const y = yFor(v);
      pathD += (pathD === '' ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1) + ' ';
      dots += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3" fill="${color}" data-idx="${i}" data-val="${esc(fmtMoney(v))}" data-label="${esc(d.label)}" class="chart-dot" style="cursor:pointer;"></circle>`;
    });

    // gridlines (3 horizontal)
    let grid = '';
    for (let g = 0; g <= 2; g++) {
      const val = min + (max - min) * (g / 2);
      const y = yFor(val);
      grid += `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${w - padR}" y2="${y.toFixed(1)}" stroke="#262d35" stroke-dasharray="3,3" />`;
      grid += `<text x="${padL - 8}" y="${(y + 3).toFixed(1)}" text-anchor="end" font-size="10" fill="#8b95a1" font-family="SFMono-Regular,Consolas,Menlo,monospace">${esc(fmtMoneyShort(val))}</text>`;
    }

    let zeroLineSvg = '';
    if (zeroLine && min < 0 && max > 0) {
      const y0 = yFor(0);
      zeroLineSvg = `<line x1="${padL}" y1="${y0.toFixed(1)}" x2="${w - padR}" y2="${y0.toFixed(1)}" stroke="#3a434d" stroke-width="1" />`;
    }

    // x labels: show first, middle, last to avoid crowding
    let xLabels = '';
    const labelIdxs = n <= 5 ? data.map((_, i) => i) : [0, Math.floor((n - 1) / 2), n - 1];
    labelIdxs.forEach((i) => {
      const x = xFor(i);
      xLabels += `<text x="${x.toFixed(1)}" y="${h - 6}" text-anchor="middle" font-size="10" fill="#8b95a1" font-family="SFMono-Regular,Consolas,Menlo,monospace">${esc(data[i].label)}</text>`;
    });

    return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" class="chart-svg" style="display:block;overflow:visible;">
      ${grid}
      ${zeroLineSvg}
      <path d="${pathD.trim()}" fill="none" stroke="${color}" stroke-width="2" />
      ${dots}
      ${xLabels}
    </svg>`;
  }

  function attachChartTooltips(container) {
    let tip = container.querySelector('.tooltip-box');
    if (!tip) {
      tip = document.createElement('div');
      tip.className = 'tooltip-box';
      container.style.position = 'relative';
      container.appendChild(tip);
    }
    const dots = container.querySelectorAll('.chart-dot');
    dots.forEach((dot) => {
      dot.addEventListener('mouseenter', (e) => {
        const val = dot.getAttribute('data-val');
        const label = dot.getAttribute('data-label');
        tip.textContent = label + ': ' + val;
        tip.style.display = 'block';
        const rect = dot.getBoundingClientRect();
        const containerRect = container.getBoundingClientRect();
        tip.style.left = (rect.left - containerRect.left + 10) + 'px';
        tip.style.top = (rect.top - containerRect.top - 28) + 'px';
      });
      dot.addEventListener('mouseleave', () => { tip.style.display = 'none'; });
    });
  }

  // ---------- render ----------
  function render() {
    const app = document.getElementById('app');
    const sortedDates = getSortedDates();
    const trailing14 = getTrailing14();
    const latest = trailing14.length ? trailing14[trailing14.length - 1] : null;
    const prior = trailing14.length > 1 ? trailing14[trailing14.length - 2] : null;
    const existing = entries[currentDate];

    function deltaHTML(curr, prev, invert) {
      if (curr === null || curr === undefined || prev === null || prev === undefined) return '';
      const d = curr - prev;
      const positive = invert ? d < 0 : d > 0;
      const color = d === 0 ? '#8b95a1' : (positive ? '#5fd9a4' : '#c47a7a');
      const arrow = d >= 0 ? '↑' : '↓';
      return `<div class="summary-delta" style="color:${color}">${arrow} ${esc(fmtMoney(Math.abs(d)))} vs prior day</div>`;
    }

    const syncBtnLabel = scriptUrl
      ? (syncStatus === 'syncing' ? '⟳ syncing' : syncStatus === 'error' ? '⚠ sheet' : '✓ sheet')
      : '⚙ connect sheet';

    app.innerHTML = `
      <div class="header-row">
        <div>
          <div class="eyebrow">Daily Ledger</div>
          <h1>Cash vs. Credit</h1>
        </div>
        <button class="btn btn-ghost" id="btn-settings" style="padding:8px 12px;">${esc(syncBtnLabel)}</button>
      </div>

      ${showSettings ? `
        <div class="panel panel-tight">
          <div style="font-size:13px;font-weight:600;margin-bottom:6px;">Google Sheet sync</div>
          <div style="font-size:12px;color:#8b95a1;margin-bottom:12px;line-height:1.5;">
            Paste your deployed Apps Script web app URL.
          </div>
          <div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;">
            <input class="num-input" type="text" id="script-url-input" placeholder="https://script.google.com/macros/s/.../exec" value="${esc(scriptUrl)}" style="flex:1;font-size:12px;min-width:200px;" />
            <button class="btn btn-primary" id="btn-save-url">Save</button>
          </div>
          ${scriptUrl ? `<button class="btn btn-ghost" id="btn-pull" style="font-size:12px;">Pull latest from sheet</button>` : ''}
          ${syncStatus === 'error' ? `<div class="sync-error">${esc(syncError)}. Data is still saved locally on this device.</div>` : ''}
        </div>
      ` : ''}

      <div class="panel">
        <div class="row-between" style="margin-bottom:16px;">
          <input type="date" class="date-input" id="date-picker" value="${esc(currentDate)}" max="${esc(todayStr())}" />
          ${existing ? `<span class="recorded-dot">● recorded</span>` : ''}
        </div>

        <div class="grid-2">
          <div class="field">
            <label>${esc(card1Label)}</label>
            <input class="num-input" type="number" inputmode="decimal" step="0.01" id="field-card1" placeholder="0.00" value="${existing && existing.card1 !== null && existing.card1 !== undefined ? existing.card1 : ''}" />
          </div>
          <div class="field">
            <label>${esc(card2Label)}</label>
            <input class="num-input" type="number" inputmode="decimal" step="0.01" id="field-card2" placeholder="0.00" value="${existing && existing.card2 !== null && existing.card2 !== undefined ? existing.card2 : ''}" />
          </div>
        </div>
        <div class="grid-2">
          <div class="field">
            <label>Total credit <span class="hint">· incl. both cards</span></label>
            <input class="num-input" type="number" inputmode="decimal" step="0.01" id="field-totalCredit" placeholder="0.00" value="${existing && existing.totalCredit !== null && existing.totalCredit !== undefined ? existing.totalCredit : ''}" />
          </div>
          <div class="field">
            <label>Spendable cash</label>
            <input class="num-input" type="number" inputmode="decimal" step="0.01" id="field-cash" placeholder="0.00" value="${existing && existing.cash !== null && existing.cash !== undefined ? existing.cash : ''}" />
          </div>
        </div>
        <div class="field">
          <label>Net worth <span class="hint">· entered directly</span></label>
          <input class="num-input" type="number" inputmode="decimal" step="0.01" id="field-netWorth" placeholder="0.00" value="${existing && existing.netWorth !== null && existing.netWorth !== undefined ? existing.netWorth : ''}" />
        </div>

        <div class="live-box" id="live-box">
          <span style="font-size:12px;color:#8b95a1;">Cash − Credit (live)</span>
          <span class="summary-value mono" id="live-value"></span>
        </div>

        <div class="actions">
          <button class="btn btn-primary" id="btn-save">${existing ? 'Update entry' : 'Save entry'}</button>
          <button class="btn btn-ghost" id="btn-rename">Rename cards</button>
          ${toastMsg ? `<span class="toast mono">${esc(toastMsg)}</span>` : ''}
        </div>

        ${editingLabels ? `
          <div class="labels-row">
            <input class="num-input" id="label-card1" placeholder="Card 1 name" value="${esc(card1Label)}" style="flex:1;min-width:140px;" />
            <input class="num-input" id="label-card2" placeholder="Card 2 name" value="${esc(card2Label)}" style="flex:1;min-width:140px;" />
            <button class="btn btn-primary" id="btn-save-labels">Save</button>
          </div>
        ` : ''}
      </div>

      ${latest ? `
        <div class="summary-grid">
          <div class="summary-card">
            <div class="summary-label">Total credit</div>
            <div class="summary-value mono">${esc(fmtMoney(latest.totalCredit))}</div>
            ${deltaHTML(latest.totalCredit, prior && prior.totalCredit, true)}
          </div>
          <div class="summary-card">
            <div class="summary-label">Spendable cash</div>
            <div class="summary-value mono">${esc(fmtMoney(latest.cash))}</div>
            ${deltaHTML(latest.cash, prior && prior.cash, false)}
          </div>
          <div class="summary-card">
            <div class="summary-label">Cash − Credit</div>
            <div class="summary-value mono" style="color:${(latest.cashMinusCredit ?? 0) >= 0 ? '#5fd9a4' : '#c47a7a'}">${esc(fmtMoney(latest.cashMinusCredit))}</div>
            ${deltaHTML(latest.cashMinusCredit, prior && prior.cashMinusCredit, false)}
          </div>
          <div class="summary-card">
            <div class="summary-label">Net worth</div>
            <div class="summary-value mono">${esc(fmtMoney(latest.netWorth))}</div>
            ${deltaHTML(latest.netWorth, prior && prior.netWorth, false)}
          </div>
        </div>
      ` : ''}

      ${trailing14.length >= 2 ? `
        <div class="chart-block"><div class="chart-title">Cash − Credit · 14d</div>${buildChartSVG(trailing14, 'cashMinusCredit', '#5fd9a4', true)}</div>
        <div class="chart-block"><div class="chart-title">Net worth · 14d</div>${buildChartSVG(trailing14, 'netWorth', '#7aa6d9', false)}</div>
        <div class="chart-block"><div class="chart-title">Total credit · 14d</div>${buildChartSVG(trailing14, 'totalCredit', '#c47a7a', false)}</div>
        <div class="chart-block"><div class="chart-title">Spendable cash · 14d</div>${buildChartSVG(trailing14, 'cash', '#c9b35f', false)}</div>
      ` : `
        <div class="empty-state">Charts appear once you've saved at least 2 days of entries.</div>
      `}

      ${sortedDates.length > 0 ? `
        <div class="footer-note">${sortedDates.length} day${sortedDates.length === 1 ? '' : 's'} recorded</div>
      ` : ''}
    `;

    // ---- wire up events (innerHTML wipes old listeners, so re-attach every render) ----
    document.getElementById('btn-settings').addEventListener('click', () => { showSettings = !showSettings; render(); });
    document.getElementById('date-picker').addEventListener('change', (e) => handleDateChange(e.target.value));
    document.getElementById('btn-save').addEventListener('click', handleSave);
    document.getElementById('btn-rename').addEventListener('click', () => { editingLabels = !editingLabels; render(); });

    ['field-totalCredit', 'field-cash'].forEach((id) => {
      const el = document.getElementById(id);
      if (el) el.addEventListener('input', updateLiveBox);
    });
    updateLiveBox();

    if (showSettings) {
      document.getElementById('btn-save-url').addEventListener('click', handleSaveScriptUrl);
      const pullBtn = document.getElementById('btn-pull');
      if (pullBtn) pullBtn.addEventListener('click', () => pullFromSheet());
    }

    if (editingLabels) {
      document.getElementById('btn-save-labels').addEventListener('click', handleSaveLabels);
    }

    document.querySelectorAll('.chart-block').forEach((block) => attachChartTooltips(block));
  }

  function updateLiveBox() {
    const liveBox = document.getElementById('live-box');
    const liveValueEl = document.getElementById('live-value');
    if (!liveBox || !liveValueEl) return;
    const tcEl = document.getElementById('field-totalCredit');
    const cashEl = document.getElementById('field-cash');
    const c1 = document.getElementById('field-card1');
    const c2 = document.getElementById('field-card2');
    const hasAny = (tcEl && tcEl.value !== '') || (cashEl && cashEl.value !== '') || (c1 && c1.value !== '') || (c2 && c2.value !== '');
    if (!hasAny) {
      liveBox.style.display = 'none';
      return;
    }
    liveBox.style.display = 'flex';
    const tc = parseFloat(tcEl ? tcEl.value : '') || 0;
    const cash = parseFloat(cashEl ? cashEl.value : '') || 0;
    const val = cash - tc;
    liveValueEl.textContent = fmtMoney(val);
    liveValueEl.style.color = val >= 0 ? '#5fd9a4' : '#c47a7a';
  }

  // ---------- boot ----------
  loadLocal();
  render();
  if (scriptUrl) pullFromSheet(scriptUrl);
})();
</script>
</body>
</html>
